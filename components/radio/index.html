<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>DSH Radio - Demo</title>
  <link rel="stylesheet" href="../../src/generated-tokens/tokens.css" />
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      background-color: #f9f9f9;
    }
    .grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .dark-bg {
      background-color: #1a1a2e;
      padding: 16px;
      border-radius: 8px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 32px;
      color: #1a1a1a;
    }
    h2 {
      margin-top: 32px;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #777;
      border-bottom: 1px solid #ddd;
      padding-bottom: 4px;
    }
    #event-log {
      margin-top: 12px;
      padding: 12px 16px;
      background: #1a1a1a;
      color: #4ade80;
      font-family: monospace;
      font-size: 13px;
      border-radius: 6px;
      min-height: 40px;
    }
  </style>
  <script src="./index.js" type="module"></script>
</head>
<body>

  <h1>DSH Radio — Demo</h1>

  <h2>Default</h2>
  <div class="grid">
    <dsh-radio id="r1" name="group1" value="opt1" label="Opción 1"></dsh-radio>
    <dsh-radio id="r2" name="group1" value="opt2" label="Opción 2"></dsh-radio>
    <dsh-radio id="r3" name="group1" value="opt3" label="Opción 3"></dsh-radio>
  </div>

  <h2>Checked</h2>
  <div class="grid">
    <dsh-radio id="r4" name="group2" value="opt1" label="Seleccionado" checked></dsh-radio>
    <dsh-radio id="r5" name="group2" value="opt2" label="No seleccionado"></dsh-radio>
  </div>

  <h2>Disabled</h2>
  <div class="grid">
    <dsh-radio id="r6" name="group3" value="opt1" label="Deshabilitado" disabled></dsh-radio>
    <dsh-radio id="r7" name="group3" value="opt2" label="Deshabilitado seleccionado" disabled checked></dsh-radio>
  </div>

  <h2>Error</h2>
  <div class="grid">
    <dsh-radio id="r8" name="group4" value="opt1" label="Con error" error></dsh-radio>
    <dsh-radio id="r9" name="group4" value="opt2" label="Error seleccionado" error checked></dsh-radio>
  </div>

  <h2>Dark mode</h2>
  <div class="dark-bg">
    <div class="grid">
      <dsh-radio id="r10" name="group5" value="opt1" label="Dark mode" dark></dsh-radio>
      <dsh-radio id="r11" name="group5" value="opt2" label="Dark mode seleccionado" dark checked></dsh-radio>
    </div>
  </div>

  <h2>Radio Group</h2>
  <dsh-radio-group>
    <dsh-radio id="rg1" name="plan" value="basic" label="Plan Básico"></dsh-radio>
    <dsh-radio id="rg2" name="plan" value="pro" label="Plan Pro" checked></dsh-radio>
    <dsh-radio id="rg3" name="plan" value="enterprise" label="Plan Enterprise"></dsh-radio>
  </dsh-radio-group>

  <h2>Eventos — onClick</h2>
  <div class="grid">
    <dsh-radio id="ev1" name="ev-group" value="a" label="Opción A"></dsh-radio>
    <dsh-radio id="ev2" name="ev-group" value="b" label="Opción B"></dsh-radio>
    <dsh-radio id="ev3" name="ev-group" value="c" label="Opción C"></dsh-radio>
  </div>
  <div id="event-log">Selecciona un radio para ver el evento <code>onClick</code></div>

<script>
  const log = document.querySelector('#event-log');
  document.querySelectorAll('[id^="ev"]').forEach((radio) => {
    radio.addEventListener('onClick', (e) => {
      log.textContent = `onClick → value: "${e.target.getAttribute('value')}", id: "${e.target.getAttribute('id')}"`;
    });
  });
</script>

</body>
</html>
