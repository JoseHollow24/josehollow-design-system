<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>DSH Checkbox - Demo</title>
  <link rel="stylesheet" href="../../src/generated-tokens/tokens.css" />
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      background-color: #f9f9f9;
    }
    .grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .dark-bg {
      background-color: #1a1a2e;
      padding: 16px;
      border-radius: 8px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 32px;
      color: #1a1a1a;
    }
    h2 {
      margin-top: 32px;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #777;
      border-bottom: 1px solid #ddd;
      padding-bottom: 4px;
    }
    #event-log {
      margin-top: 12px;
      padding: 12px 16px;
      background: #1a1a1a;
      color: #4ade80;
      font-family: monospace;
      font-size: 13px;
      border-radius: 6px;
      min-height: 40px;
    }
  </style>
  <script src="./index.js" type="module"></script>
</head>
<body>

  <h1>DSH Checkbox — Demo</h1>

  <h2>Default</h2>
  <div class="grid">
    <dsh-checkbox id="cb1" name="group1" label="Opción 1" value="opt1"></dsh-checkbox>
    <dsh-checkbox id="cb2" name="group1" label="Opción 2" value="opt2"></dsh-checkbox>
  </div>

  <h2>Checked</h2>
  <div class="grid">
    <dsh-checkbox id="cb3" name="group2" label="Marcado por defecto" value="opt3" checked></dsh-checkbox>
  </div>

  <h2>Disabled</h2>
  <div class="grid">
    <dsh-checkbox id="cb4" name="group3" label="Deshabilitado" value="opt4" disabled></dsh-checkbox>
    <dsh-checkbox id="cb5" name="group3" label="Deshabilitado marcado" value="opt5" disabled checked></dsh-checkbox>
  </div>

  <h2>Error</h2>
  <div class="grid">
    <dsh-checkbox id="cb6" name="group4" label="Con error" value="opt6" error></dsh-checkbox>
  </div>

  <h2>Indeterminate</h2>
  <div class="grid">
    <dsh-checkbox id="cb7" name="group5" label="Estado indeterminado" value="opt7" indeterminate></dsh-checkbox>
  </div>

  <h2>Dark mode</h2>
  <div class="dark-bg">
    <div class="grid">
      <dsh-checkbox id="cb8" name="group6" label="Dark mode" value="opt8" dark></dsh-checkbox>
      <dsh-checkbox id="cb9" name="group6" label="Dark mode marcado" value="opt9" dark checked></dsh-checkbox>
    </div>
  </div>

  <h2>Eventos — checkbox-change</h2>
  <div class="grid">
    <dsh-checkbox id="ev-cb" name="ev-group" label="Checkbox con evento" value="ev-value"></dsh-checkbox>
  </div>
  <div id="event-log">Marca el checkbox para ver el evento <code>checkbox-change</code></div>

<script>
  const log = document.querySelector('#event-log');
  document.querySelector('#ev-cb').addEventListener('checkbox-change', (e) => {
    const { checked, value, name, id } = e.detail;
    log.textContent = `checkbox-change → checked: ${checked}, value: "${value}", name: "${name}", id: "${id}"`;
  });
</script>

</body>
</html>
