name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  storybook-tests:
    name: Storybook — Vitest + Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar browsers Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar tests de Storybook
        run: npm run test:storybook:run

      - name: Generar reporte de cobertura
        run: npm run coverage

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  component-tests:
    name: Web Test Runner — Componentes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build componentes
        run: npm run build:all-components

      - name: Test — Button
        run: npm run test:button

      - name: Test — Icon
        run: npm run test:icon
